<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas realizadas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0052CC">
    <meta name="description" content="Controla tus horas de trabajo anuales - EMT">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Horas Realizadas">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23E8F0FF' width='192' height='192'/><circle cx='96' cy='96' r='85' fill='none' stroke='%230052CC' stroke-width='5'/><circle cx='96' cy='96' r='75' fill='%230052CC' opacity='0.1'/><line x1='96' y1='40' x2='96' y2='60' stroke='%230052CC' stroke-width='4'/><line x1='152' y1='96' x2='172' y2='96' stroke='%230052CC' stroke-width='4'/><line x1='96' y1='96' x2='96' y2='65' stroke='%230052CC' stroke-width='5' stroke-linecap='round'/><line x1='96' y1='96' x2='125' y2='96' stroke='%230052CC' stroke-width='5' stroke-linecap='round'/><circle cx='96' cy='96' r='7' fill='%230052CC'/><text x='96' y='165' font-family='Arial' font-size='32' font-weight='bold' text-anchor='middle' fill='%230052CC'>EMT</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 12px;
        }

        .progress-text {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            font-weight: 600;
        }

        .progress-text span {
            color: #667eea;
            font-weight: 700;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 2px solid #e0e0e0;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #95a5a6;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            box-shadow: 0 8px 25px rgba(149, 165, 166, 0.3);
        }

        .info-date {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #f0f4ff;
            border-radius: 8px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
        }

        .historial-section {
            margin-bottom: 25px;
        }

        .historial-section h3 {
            color: #34495e;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .historial-list {
            list-style: none;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .historial-list li {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .historial-list li:last-child {
            border-bottom: none;
        }

        .historial-fecha {
            color: #7f8c8d;
            font-weight: 600;
            font-size: 13px;
        }

        .historial-horas {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            color: #95a5a6;
            padding: 20px 10px;
            font-size: 13px;
        }

        .completed-badge {
            text-align: center;
            padding: 15px;
            background: #d5f4e6;
            border-radius: 8px;
            color: #27ae60;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }

        .completed-badge.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 12px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .stat-value {
                font-size: 28px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <svg viewBox="0 0 120 120" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
            <!-- Círculo exterior -->
            <circle cx="60" cy="60" r="55" fill="none" stroke="#0052CC" stroke-width="3"/>
            
            <!-- Círculo interior -->
            <circle cx="60" cy="60" r="48" fill="#E8F0FF"/>
            
            <!-- Reloj/progreso -->
            <circle cx="60" cy="60" r="40" fill="none" stroke="#0052CC" stroke-width="2" opacity="0.3"/>
            
            <!-- Líneas de reloj -->
            <line x1="60" y1="25" x2="60" y2="35" stroke="#0052CC" stroke-width="2"/>
            <line x1="85" y1="60" x2="95" y2="60" stroke="#0052CC" stroke-width="2"/>
            
            <!-- Agujas del reloj -->
            <line x1="60" y1="60" x2="60" y2="42" stroke="#0052CC" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="60" y1="60" x2="72" y2="60" stroke="#0052CC" stroke-width="2.5" stroke-linecap="round"/>
            
            <!-- Centro del reloj -->
            <circle cx="60" cy="60" r="4" fill="#0052CC"/>
            
            <!-- Texto EMT -->
            <text x="60" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0052CC">EMT</text>
        </svg>
    </div>
    <h1>Horas Realizadas</h1>

        <div class="completed-badge" id="completedBadge">
            ✓ ¡Has alcanzado las 777 horas! 🎉
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Horas Restantes</div>
                <div class="stat-value" id="horasRestantes">777</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Horas Trabajadas</div>
                <div class="stat-value" id="horasTrabajadas">0</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="porcentaje">0</span>% completado
            </div>
        </div>

        <div class="info-date" id="fechaHoy"></div>

        <div class="input-section">
            <label for="fechaInput">Selecciona la fecha:</label>
            <div class="input-wrapper">
                <input 
                    type="date" 
                    id="fechaInput"
                    autocomplete="off"
                >
            </div>

            <label for="horasInput" style="margin-top: 15px;">Horas trabajadas:</label>
            <div class="input-wrapper">
                <input 
                    type="number" 
                    id="horasInput" 
                    min="0" 
                    step="0.5" 
                    placeholder="Ej: 8, 4.5, 6"
                    autocomplete="off"
                >
            </div>
            <button onclick="registrarHoras()">Registrar Horas</button>
            <button class="btn-secondary" onclick="limpiarInput()">Limpiar</button>
        </div>

        <div class="historial-section">
            <h3>Últimas jornadas</h3>
            <ul class="historial-list" id="historialList">
                <li class="empty-state">Sin registros aún</li>
            </ul>
        </div>
    </div>

    <script>
        const HORAS_ANUALES = 777;
        const STORAGE_KEY = 'horasTrabajoData';

        const horasRestantesEl = document.getElementById('horasRestantes');
        const horasTrabajadasEl = document.getElementById('horasTrabajadas');
        const fechaInput = document.getElementById('fechaInput');
        const inputHoras = document.getElementById('horasInput');
        const progressFill = document.getElementById('progressFill');
        const porcentaje = document.getElementById('porcentaje');
        const historialList = document.getElementById('historialList');
        const fechaHoyEl = document.getElementById('fechaHoy');
        const completedBadge = document.getElementById('completedBadge');

        // Inicializar al cargar
        document.addEventListener('DOMContentLoaded', () => {
            establecerFechaHoy();
            cargarDatos();
            actualizarFecha();
            inputHoras.focus();
        });

        // Enter para registrar
        inputHoras.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                registrarHoras();
            }
        });

        function establecerFechaHoy() {
            const hoy = new Date();
            const año = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const día = String(hoy.getDate()).padStart(2, '0');
            fechaInput.value = `${año}-${mes}-${día}`;
            fechaInput.max = `${año}-${mes}-${día}`;
        }

        function cargarDatos() {
            const datosGuardados = localStorage.getItem(STORAGE_KEY);
            let datos = datosGuardados ? JSON.parse(datosGuardados) : {
                horasTrabajadas: 0,
                historial: [],
                ultimoReseteo: new Date().getFullYear()
            };

            // Resetear si hoy es 1 de enero y no se ha reseteado este año
            const hoy = new Date();
            if (hoy.getMonth() === 0 && hoy.getDate() === 1 && datos.ultimoReseteo !== hoy.getFullYear()) {
                datos = {
                    horasTrabajadas: 0,
                    historial: [],
                    ultimoReseteo: hoy.getFullYear()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
            }

            actualizarUI(datos);
        }

        function registrarHoras() {
            const horas = parseFloat(inputHoras.value);
            const fechaSeleccionada = fechaInput.value;

            if (!fechaSeleccionada) {
                alert('Por favor, selecciona una fecha');
                fechaInput.focus();
                return;
            }

            if (!inputHoras.value || isNaN(horas) || horas <= 0) {
                alert('Por favor, ingresa un número válido de horas');
                inputHoras.focus();
                return;
            }

            const datosGuardados = localStorage.getItem(STORAGE_KEY);
            let datos = datosGuardados ? JSON.parse(datosGuardados) : {
                horasTrabajadas: 0,
                historial: [],
                ultimoReseteo: new Date().getFullYear()
            };

            // Verificar límite
            if (datos.horasTrabajadas + horas > HORAS_ANUALES) {
                const horasDisponibles = HORAS_ANUALES - datos.horasTrabajadas;
                alert(`Solo tienes ${horasDisponibles.toFixed(1)} horas disponibles este año.`);
                inputHoras.focus();
                return;
            }

            // Agregar horas
            datos.horasTrabajadas = Math.round((datos.horasTrabajadas + horas) * 10) / 10;

            // Agregar al historial
            const fecha = new Date(fechaSeleccionada);
            const fechaFormato = fecha.toLocaleDateString('es-ES', {
                weekday: 'short',
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            datos.historial.unshift({
                id: Date.now(),
                fecha: fechaFormato,
                fechaISO: fechaSeleccionada,
                horas: horas,
                timestamp: fecha.getTime()
            });

            // Mantener últimos 100 registros
            if (datos.historial.length > 100) {
                datos.historial = datos.historial.slice(0, 100);
            }

            // Ordenar historial por fecha (más recientes primero)
            datos.historial.sort((a, b) => b.timestamp - a.timestamp);

            localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
            actualizarUI(datos);
            establecerFechaHoy();
            inputHoras.value = '';
            inputHoras.focus();
        }

        function limpiarInput() {
            inputHoras.value = '';
            establecerFechaHoy();
            inputHoras.focus();
        }

        function actualizarUI(datos) {
            const horasRestantes = Math.max(0, HORAS_ANUALES - datos.horasTrabajadas);
            const porcentajeCompleto = (datos.horasTrabajadas / HORAS_ANUALES) * 100;

            horasTrabajadasEl.textContent = datos.horasTrabajadas.toFixed(1);
            horasRestantesEl.textContent = horasRestantes.toFixed(1);
            porcentaje.textContent = Math.min(Math.round(porcentajeCompleto), 100);

            progressFill.style.width = Math.min(porcentajeCompleto, 100) + '%';

            if (porcentajeCompleto >= 100) {
                progressFill.style.background = 'linear-gradient(90deg, #27ae60 0%, #229954 100%)';
                completedBadge.classList.add('show');
            } else {
                progressFill.style.background = 'linear-gradient(90deg, #667eea 0%, #764ba2 100%)';
                completedBadge.classList.remove('show');
            }

            actualizarHistorial(datos.historial);
        }

        function actualizarHistorial(historial) {
            historialList.innerHTML = '';

            if (historial.length === 0) {
                historialList.innerHTML = '<li class="empty-state">Sin registros aún</li>';
                return;
            }

            historial.forEach((registro) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="historial-fecha">${registro.fecha}</span>
                    <span class="historial-horas">${registro.horas} h</span>
                `;
                historialList.appendChild(li);
            });
        }

        function actualizarFecha() {
            const ahora = new Date();
            const opciones = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const fechaFormato = ahora.toLocaleDateString('es-ES', opciones);
            fechaHoyEl.textContent = `📅 Hoy: ${fechaFormato}`;
        }
    </script>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('✅ beforeinstallprompt disparado - App es instalable');
            e.preventDefault();
            deferredPrompt = e;
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ App instalada exitosamente');
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registrado:', registration);
                    })
                    .catch((error) => {
                        console.error('❌ Error Service Worker:', error);
                    });
            });
        }

        window.addEventListener('load', () => {
            console.log('📱 App PWA cargada');
            console.log('Manifest:', document.querySelector('link[rel="manifest"]')?.href);
            console.log('Theme:', document.querySelector('meta[name="theme-color"]')?.content);
            console.log('SW soportado:', 'serviceWorker' in navigator);
        });
    </script>
</body>
</html>
